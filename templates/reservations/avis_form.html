{% extends 'base.html' %}
{% block title %}Laisser un Avis - LOVOI{% endblock %}

{% block extra_css %}
<style>
    body {
        background: linear-gradient(135deg, #1a1a2e, #0f0f1a);
        min-height: 100vh;
        color: #fff;
    }
    .glass-card-body {
        background: rgba(255,255,255,0.05);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid rgba(255,255,255,0.1);
        border-radius: 20px;
        padding: 30px;
    }
    .btn-glass-success {
        background: linear-gradient(135deg, #4ecdc4, #3dbdb5);
        border: none;
        color: #fff;
        padding: 12px 28px;
        border-radius: 12px;
        font-weight: 600;
        transition: all 0.3s ease;
        box-shadow: 0 4px 15px rgba(78,205,196,0.3);
    }
    .btn-glass-success:hover {
        background: linear-gradient(135deg, #3dbdb5, #4ecdc4);
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(78,205,196,0.4);
        color: #fff;
    }
    .form-select, .form-control {
        background: rgba(255,255,255,0.05);
        border: 1px solid rgba(255,255,255,0.1);
        color: #fff;
        border-radius: 12px;
        padding: 12px 16px;
        transition: all 0.3s ease;
    }
    .form-select:focus, .form-control:focus {
        background: rgba(255,255,255,0.08);
        border-color: rgba(78,205,196,0.5);
        box-shadow: 0 0 0 3px rgba(78,205,196,0.15);
        color: #fff;
        outline: none;
    }
    .form-select option {
        background: #1a1a2e;
        color: #fff;
    }
    .form-control::placeholder {
        color: rgba(255,255,255,0.35);
    }
    label {
        color: rgba(255,255,255,0.8);
        font-weight: 500;
        margin-bottom: 8px;
    }
    .page-title {
        font-size: 1.75rem;
        background: linear-gradient(135deg, #fff, rgba(255,255,255,0.7));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
    }
    .rating-stars {
        font-size: 1.5rem;
        letter-spacing: 4px;
    }
    .rating-option {
        background: rgba(255,255,255,0.03);
        border: 1px solid rgba(255,255,255,0.08);
        border-radius: 12px;
        padding: 12px 16px;
        margin-bottom: 8px;
        cursor: pointer;
        transition: all 0.3s ease;
    }
    .rating-option:hover {
        background: rgba(255,255,255,0.06);
        border-color: rgba(255,255,255,0.15);
    }
    .rating-option.selected {
        background: rgba(78,205,196,0.15);
        border-color: rgba(78,205,196,0.4);
    }
    .star {
        color: rgba(255,255,255,0.2);
        transition: color 0.2s ease;
    }
    .star.filled {
        color: #ffc107;
    }
</style>
{% endblock %}

{% block content %}
<div class="container mt-4 pb-5">
    <h1 class="page-title mb-4">Laisser un Avis pour {{ vehicule }}</h1>

    <div class="glass-card-body">
        <form method="post">
            {% csrf_token %}
            <div class="mb-4">
                <label class="mb-3">Note</label>
                <div class="rating-options">
                    <div class="rating-option selected" data-value="5">
                        <span class="star filled">★★★★★</span> <span class="ms-2 text-white-50">Excellent</span>
                    </div>
                    <div class="rating-option" data-value="4">
                        <span class="star filled">★★★★☆</span> <span class="ms-2 text-white-50">Très bien</span>
                    </div>
                    <div class="rating-option" data-value="3">
                        <span class="star filled">★★★☆☆</span> <span class="ms-2 text-white-50">Bien</span>
                    </div>
                    <div class="rating-option" data-value="2">
                        <span class="star filled">★★☆☆☆</span> <span class="ms-2 text-white-50">Moyen</span>
                    </div>
                    <div class="rating-option" data-value="1">
                        <span class="star filled">★☆☆☆☆</span> <span class="ms-2 text-white-50">Mauvais</span>
                    </div>
                </div>
                <input type="hidden" name="note" id="selected-rating" value="5">
            </div>
            <div class="mb-4">
                <label>Commentaire</label>
                <textarea name="commentaire" class="form-control" rows="4" placeholder="Partagez votre expérience avec ce véhicule..."></textarea>
            </div>
            <button type="submit" class="btn btn-glass-success">
                <i class="fas fa-paper-plane me-2"></i>Publier l'Avis
            </button>
        </form>
    </div>
</div>

<script>
document.querySelectorAll('.rating-option').forEach(option => {
    option.addEventListener('click', function() {
        document.querySelectorAll('.rating-option').forEach(o => o.classList.remove('selected'));
        this.classList.add('selected');
        document.getElementById('selected-rating').value = this.dataset.value;
    });
});
</script>
{% endblock %}
