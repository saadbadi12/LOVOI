{% extends 'base.html' %}
{% block title %}État des Lieux - LOVOI{% endblock %}

{% block content %}
<div class="container mt-4">
    <h1>État des Lieux - Réservation {{ reservation.reference }}</h1>

    <div class="card mt-4">
        <div class="card-body">
            <form method="post" enctype="multipart/form-data">
                {% csrf_token %}
                <input type="hidden" name="reservation" value="{{ reservation.id }}">
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label>Kilométrage</label>
                        <input type="number" name="kilometrage" class="form-control" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label>Niveau de carburant</label>
                        <select name="niveau_carburant" class="form-select">
                            <option value="PLEIN">Plein</option>
                            <option value="TROIS_QUARTS">Trois quarts</option>
                            <option value="MOITIE">Moitié</option>
                            <option value="QUART">Quart</option>
                            <option value="VIDE">Vide</option>
                        </select>
                    </div>
                </div>
                <div class="mb-3">
                    <label>Commentaire</label>
                    <textarea name="commentaire" class="form-control" rows="3"></textarea>
                </div>
                <div class="mb-3">
                    <label>Photos</label>
                    <input type="file" name="photos" class="form-control">
                </div>
                <button type="submit" class="btn btn-success">Enregistrer</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
