{% extends 'base.html' %}
{% block title %}Modifier utilisateur - LOVOI{% endblock %}

{% block content %}
<div class="container py-5" style="max-width:500px">
  <h2 class="mb-4">Modifier l'utilisateur — {{ u.username }}</h2>
  <form method="post">
    {% csrf_token %}
    <div class="mb-3">
      <label class="form-label fw-bold">Rôle</label>
      <select name="role" class="form-select">
        {% for val, label in u.ROLE_CHOICES %}
          <option value="{{ val }}" {% if u.role == val %}selected{% endif %}>
            {{ label }}
          </option>
        {% endfor %}
      </select>
    </div>
    <div class="mb-3 form-check">
      <input type="checkbox" class="form-check-input" 
             name="actif" id="actif" 
             {% if u.actif %}checked{% endif %}>
      <label class="form-check-label" for="actif">Compte actif</label>
    </div>
    <div class="d-flex gap-2">
      <button type="submit" class="btn btn-primary">Enregistrer</button>
      <a href="{% url 'accounts:user_list' %}" class="btn btn-secondary">Annuler</a>
    </div>
  </form>
</div>
{% endblock %}
